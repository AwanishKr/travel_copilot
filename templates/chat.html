<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Trip Co-pilot</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3e;
      --accent:  #4f8ef7;
      --text:    #e2e8f0;
      --muted:   #8892a4;
      --user-bg: #1e3a5f;
      --bot-bg:  #1a1d27;
      --danger:  #e05c5c;
      --success: #4caf7d;
    }

    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    #app { display: grid; grid-template-columns: 1fr 420px; height: 100vh; }

    /* ── Map panel ── */
    #map-panel { display: flex; flex-direction: column; background: #0d1520; }
    #map { flex: 1; }
    #route-card { padding: 14px 16px; background: var(--surface); border-top: 1px solid var(--border); min-height: 80px; }
    #route-card.hidden { display: none; }
    .route-header { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .route-meta   { font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
    .route-meta span { white-space: nowrap; }
    .checkpoints  { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; max-height: 140px; overflow-y: auto; }
    .cp { font-size: 12px; display: flex; align-items: flex-start; gap: 6px; padding: 4px 6px; border-radius: 6px; background: rgba(255,255,255,0.04); }
    .cp-km   { color: var(--muted); min-width: 48px; }
    .cp-icon { font-size: 13px; }
    .cp-name { font-weight: 500; }
    .cp-note { color: var(--muted); font-size: 11px; margin-left: 4px; }
    .cp-weather { margin-left: auto; font-size: 11px; white-space: nowrap; }

    /* ── Chat panel ── */
    #chat-panel { display: flex; flex-direction: column; border-left: 1px solid var(--border); }

    #chat-header {
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    #chat-header h1 { font-size: 15px; font-weight: 600; }
    #chat-header .tagline { font-size: 11px; color: var(--muted); }
    #reset-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 6px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
    }
    #reset-btn:hover { border-color: var(--danger); color: var(--danger); }

    #messages {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    .msg { display: flex; flex-direction: column; max-width: 90%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 13px; border-radius: 14px; font-size: 13px; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.bot.error .bubble { border-color: var(--danger); color: var(--danger); }
    .msg.bot.clarify .bubble { border-color: #f0a500; color: #f0c040; }

    .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 4px; }

    /* Typing indicator */
    .typing .bubble { padding: 14px 16px; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity:.2 } 40% { opacity:1 } }

    /* Suggestions */
    #suggestions { padding: 8px 16px; display: flex; gap: 6px; flex-wrap: wrap; }
    .sug {
      font-size: 11px; padding: 5px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; white-space: nowrap;
    }
    .sug:hover { border-color: var(--accent); color: var(--accent); }

    /* Input */
    #input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
    }
    #msg-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 13px; color: var(--text); font-size: 13px;
      resize: none; max-height: 120px; line-height: 1.4; outline: none;
      font-family: inherit;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn {
      width: 38px; height: 38px; border-radius: 10px; background: var(--accent);
      border: none; color: #fff; cursor: pointer; font-size: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-btn:hover:not(:disabled) { background: #3a7ae0; }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (max-width: 700px) {
      #app { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; }
      #map-panel { grid-row: 1; }
      #chat-panel { grid-row: 2; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Map + Route Card ── -->
  <div id="map-panel">
    <div id="map"></div>
    <div id="route-card" class="hidden">
      <div class="route-header" id="rc-title"></div>
      <div class="route-meta">
        <span id="rc-dist"></span>
        <span id="rc-time"></span>
        <span id="rc-toll"></span>
      </div>
      <div class="checkpoints" id="rc-checkpoints"></div>
    </div>
  </div>

  <!-- ── Chat Panel ── -->
  <div id="chat-panel">
    <div id="chat-header">
      <div>
        <h1>🚗 Road Trip Co-pilot</h1>
        <div class="tagline">Indian highways · real-time guidance</div>
      </div>
      <button id="reset-btn" onclick="resetSession()">New trip</button>
    </div>

    <div id="messages">
      <!-- welcome message -->
      <div class="msg bot">
        <div class="bubble">Namaste! 🙏 I'm your road trip co-pilot for Indian highways.

Tell me where you're headed and I'll plan the route, checkpoints, weather, dhabas, and budget.

Try: <em>Delhi to Manali</em> or <em>Mumbai to Goa via Pune</em></div>
        <div class="msg-time">now</div>
      </div>
    </div>

    <div id="suggestions">
      <button class="sug" onclick="sendSug(this)">Delhi to Manali</button>
      <button class="sug" onclick="sendSug(this)">Weather along route</button>
      <button class="sug" onclick="sendSug(this)">Dhabas on the way</button>
      <button class="sug" onclick="sendSug(this)">Budget for 2 people</button>
      <button class="sug" onclick="sendSug(this)">Hotels at destination</button>
    </div>

    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="Ask about your route…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">&#9658;</button>
    </div>
  </div>
</div>

<script>
// ── Map setup ──
const map = L.map('map', { zoomControl: true }).setView([22.5, 80.5], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);

let routeLayer  = null;
let markerGroup = L.layerGroup().addTo(map);

function clearMap() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  markerGroup.clearLayers();
}

function renderTrip(ctx) {
  clearMap();

  const checkpoints = ctx.checkpoints || [];

  // Draw route geometry if available
  if (ctx.geometry && ctx.geometry.length > 1) {
    routeLayer = L.polyline(ctx.geometry, { color: '#4f8ef7', weight: 4, opacity: 0.8 }).addTo(map);
    map.fitBounds(routeLayer.getBounds(), { padding: [20, 20] });
  }

  // Add checkpoint markers
  const typeColor = {
    fuel_food: '#f0a500', major_city: '#4f8ef7', gateway: '#9b59b6',
    mountain_critical: '#e05c5c', scenic: '#4caf7d', destination: '#e05c5c',
  };
  const typeIcon = {
    fuel_food: '🍽', major_city: '🏙', gateway: '🚧',
    mountain_critical: '⛰', scenic: '📸', destination: '🏁',
  };

  checkpoints.forEach((cp, i) => {
    if (!cp.coords) return;
    const [lat, lon] = cp.coords;
    const color = typeColor[cp.type] || '#888';
    const icon  = L.divIcon({
      html: `<div style="background:${color};width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>`,
      className: '', iconSize: [12, 12], iconAnchor: [6, 6],
    });
    const w = cp.weather;
    const weatherStr = w ? `${w.icon} ${w.temp_c}°C` : '';
    L.marker([lat, lon], { icon })
      .bindPopup(`<b>${cp.name}</b><br>${typeIcon[cp.type] || '📍'} ${cp.type?.replace('_', ' ')}<br>${cp.note || ''}<br>${weatherStr}`)
      .addTo(markerGroup);
  });

  // Update route card
  renderRouteCard(ctx);
}

function renderRouteCard(ctx) {
  const card = document.getElementById('route-card');
  card.classList.remove('hidden');

  document.getElementById('rc-title').textContent =
    `${cap(ctx.origin)} → ${cap(ctx.destination)}` +
    (ctx.via?.length ? ` via ${ctx.via.map(cap).join(', ')}` : '');

  const hrs = Math.floor((ctx.total_eta_min || 0) / 60);
  const mins = (ctx.total_eta_min || 0) % 60;
  document.getElementById('rc-dist').textContent = ctx.total_km ? `📍 ${ctx.total_km} km` : '';
  document.getElementById('rc-time').textContent = ctx.total_eta_min ? `⏱ ~${hrs}h ${mins}m` : '';
  document.getElementById('rc-toll').textContent = ctx.toll ? `🪙 ₹${ctx.toll.amount?.toLocaleString()}` : '';

  const cpEl = document.getElementById('rc-checkpoints');
  cpEl.innerHTML = '';
  (ctx.checkpoints || []).forEach(cp => {
    const w = cp.weather;
    const weatherStr = w ? `${w.icon} ${w.temp_c}°C` : '';
    const icons = { fuel_food:'🍽', major_city:'🏙', gateway:'🚧', mountain_critical:'⛰', scenic:'📸', destination:'🏁' };
    cpEl.innerHTML += `
      <div class="cp">
        <span class="cp-km">${Math.round(cp.km_from_start)} km</span>
        <span class="cp-icon">${icons[cp.type] || '📍'}</span>
        <span class="cp-name">${cap(cp.name)}</span>
        ${cp.note ? `<span class="cp-note">· ${cp.note}</span>` : ''}
        ${weatherStr ? `<span class="cp-weather">${weatherStr}</span>` : ''}
      </div>`;
  });
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

// ── Chat ──
const messagesEl = document.getElementById('messages');
let busy = false;

function addMessage(role, text, type='response') {
  const div = document.createElement('div');
  div.className = `msg ${role}` + (role === 'bot' && type !== 'response' ? ` ${type}` : '');
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `<div class="bubble">${escHtml(text)}</div><div class="msg-time">${now}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.id = 'typing';
  div.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<em>$1</em>');
}

async function sendMessage() {
  if (busy) return;
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  addMessage('user', text);

  busy = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    removeTyping();

    addMessage('bot', data.text || 'No response.', data.type || 'response');

    // If we got a trip_context, render it on the map
    const ctx = data.data?.trip_context;
    if (ctx) renderTrip(ctx);

  } catch (e) {
    removeTyping();
    addMessage('bot', 'Connection error. Is the server running?', 'error');
  } finally {
    busy = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function sendSug(btn) {
  document.getElementById('msg-input').value = btn.textContent;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function resetSession() {
  await fetch('/reset', { method: 'POST' });
  messagesEl.innerHTML = '';
  clearMap();
  document.getElementById('route-card').classList.add('hidden');
  addMessage('bot', 'Session reset. Where would you like to go?');
}
</script>
</body>
</html>
